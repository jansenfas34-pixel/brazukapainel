        .login-card {
            background: #1e1e1e; padding: 40px; border-radius: 15px;

            width: 100%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);

        .app-title span { color: var(--primary-color); }

        .logout-btn { background: none; border: 1px solid #444; color: #888; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }

        .container { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }
        .sidebar { width: 300px; min-width: 300px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; height: 100%; }

        .search-box { position: relative; margin-top: 10px; }
        .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #888; }
        .search-box input { width: 100%; padding: 10px 10px 10px 35px; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box; }

        .grupo-categoria { margin-bottom: 5px; }
        .btn-categoria { width: 100%; padding: 12px 20px; background: none; border: none; color: #ccc; text-align: left; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .btn-categoria.active { background: #2a2a2a; color: white; }
        .btn-categoria .chevron { transition: transform 0.3s; }
        .btn-categoria.active .chevron { transform: rotate(180deg); }

        .conteudo-canais { background: #151515; display: none; }
        .btn-canal { width: 100%; padding: 10px 25px; background: none; border: none; color: #999; text-align: left; font-size: 13px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s; }
        .btn-canal:hover { background: #333; color: var(--primary-color); padding-left: 30px; }
        .btn-canal.playing { background: rgba(255, 204, 0, 0.1); color: var(--primary-color); border-left: 3px solid var(--primary-color); }

        .main-content { flex: 1; background: #000; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .video-container { width: 100%; height: 60%; position: relative; background: #000; overflow: hidden; }
        .video-js { width: 100% !important; height: 100% !important; }

        .custom-loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid var(--primary-color);

</head>

        // ════════════════════════════════════════════════════════
        //  CONFIGURAÇÕES
        // ════════════════════════════════════════════════════════
        const PROXY_BASE_URL = "https://brazuka-m3u8-proxy-production.up.railway.app";
        const firebaseConfig = { databaseURL: "https://brazuka-monitor-default-rtdb.firebaseio.com" };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player;
        let hls;
        let isStopping = false;
        let userId = "";

        // ════════════════════════════════════════════════════════
        //  SISTEMA DE LOGIN (MÚLTIPLOS USUÁRIOS)
        // ════════════════════════════════════════════════════════
        window.onload = function() {
            const savedUser = localStorage.getItem('brazuka_user');
            const savedStatus = localStorage.getItem('brazuka_logged');
            if (savedStatus === "true" && savedUser) {
                userId = savedUser;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('user-display').innerText = "Olá, " + userId;
                renderCategories();
                try { trackUserStatus("Online - Retornou"); } catch(e){}
            }
        };

        async function checkAccess() {
            const name = document.getElementById('user-name').value.trim().toLowerCase();
            const key = document.getElementById('access-key').value.trim();
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('login-error');

            if (!name || !key) {
                error.style.display = 'block';
                error.innerText = "Preencha todos os campos.";
                return;
            }

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                // Consulta o Firebase na pasta 'usuarios/nome'
                const snapshot = await db.ref('usuarios/' + name).once('value');
                const userData = snapshot.val();

                if (userData && userData.senha === key) {
                    userId = name;
                    localStorage.setItem('brazuka_user', name);
                    localStorage.setItem('brazuka_logged', "true");
                    
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('user-display').innerText = "Olá, " + userId;
                    
                    renderCategories();
                    try { trackUserStatus("Online - Login Realizado"); } catch(e){}
                } else {
                    error.style.display = 'block';
                    error.innerText = "Usuário ou senha incorretos.";
                    btn.innerText = "ENTRAR";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                error.style.display = 'block';
                error.innerText = "Erro ao conectar. Tente novamente.";
                btn.innerText = "ENTRAR";
                btn.disabled = false;
            }
        }

        // ════════════════════════════════════════════════════════
        //  RENDERIZAÇÃO E FILTRO
        // ════════════════════════════════════════════════════════
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';
            channelData.forEach((cat) => {
                const group = document.createElement('div');
                group.className = 'grupo-categoria';
                group.innerHTML = `
                    <button class="btn-categoria" onclick="toggleCategoria(this)">
                        <span><i class="fas ${cat.icon || 'fa-tv'} cat-icon"></i> ${cat.category}</span>
                        <i class="fas fa-chevron-down chevron"></i>
                    </button>
                    <div class="conteudo-canais" style="display:none;">
                        ${cat.channels.map(ch => `
                            <button class="btn-canal" onclick="mudarCanal('${ch.url}', this, '${ch.name}')">
                                <i class="fas fa-play-circle"></i> ${ch.name}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(group);
            });
        }

        function toggleCategoria(btn) {
            const content = btn.nextElementSibling;
            const isActive = btn.classList.contains('active');
            document.querySelectorAll('.btn-categoria').forEach(b => {
                if (b !== btn) { b.classList.remove('active'); b.nextElementSibling.style.display = 'none'; }
            });
            if (isActive) { btn.classList.remove('active'); content.style.display = 'none'; }
            else { btn.classList.add('active'); content.style.display = 'block'; }
        }

        function filterChannels() {
            const searchTerm = document.getElementById('channelSearch').value.toLowerCase();
            document.querySelectorAll('.grupo-categoria').forEach(cat => {
                const buttons = cat.querySelectorAll('.btn-canal');
                const catButton = cat.querySelector('.btn-categoria');
                const content = cat.querySelector('.conteudo-canais');
                let hasMatch = false;

                buttons.forEach(btn => {
                    if (btn.textContent.toLowerCase().includes(searchTerm)) {
                        btn.style.display = 'flex'; hasMatch = true;
                    } else { btn.style.display = 'none'; }
                });

                if (searchTerm.length > 0) {
                    cat.style.display = hasMatch ? 'block' : 'none';
                    if (hasMatch) { catButton.classList.add('active'); content.style.display = 'block'; }
                } else {
                    cat.style.display = 'block'; catButton.classList.remove('active'); content.style.display = 'none';
                }
            });
        }

        // ════════════════════════════════════════════════════════
        //  PLAYER E PROXY INTELIGENTE
        // ════════════════════════════════════════════════════════
        function buildProxyUrl(originalUrl) {
            return `${PROXY_BASE_URL}/proxy/playlist?url=${encodeURIComponent(originalUrl)}`;
        }

        function mudarCanal(originalUrl, btn, channelName = "") {
            isStopping = false; hideError();
            document.getElementById('custom-loader').style.display = 'block';
            document.querySelectorAll('.btn-canal').forEach(b => b.classList.remove('playing'));
            btn.classList.add('playing');
            document.getElementById('currentChannelName').innerText = channelName;

            let finalUrl;
            const bypassWords = ["google", "youtube", "camera", "direct", "rudo.video", "mdstrm.com", "otteravision.com", "cloudfront.net"];
            const shouldBypass = bypassWords.some(word => originalUrl.toLowerCase().includes(word));

            if (shouldBypass) {
                finalUrl = originalUrl;
            } else {
                finalUrl = buildProxyUrl(originalUrl);
            }

            const videoElement = document.getElementById('my-video_html5_api');
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({ maxBufferLength: 30, manifestLoadingTimeOut: 15000 });
                hls.loadSource(finalUrl);
                hls.attachMedia(videoElement);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal && !isStopping) showError(); });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = finalUrl; player.play();
            }
            hideWelcome();
            try { trackUserStatus("Assistindo: " + channelName); } catch(e){}
        }

        function trackUserStatus(status) {
            if (!userId || !db) return;
            const userRef = db.ref('monitoramento/' + userId.replace(/[.#$[\]]/g, "_"));
            userRef.set({
                nome: userId, status: status,
                ultima_atividade: new Date().toLocaleString(),
                dispositivo: navigator.userAgent.substring(0, 50)
            });
            userRef.onDisconnect().update({ status: "Offline" });
        }

        function logout() { localStorage.clear(); location.reload(); }

        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('my-video', { bigPlayButton: false, loadingSpinner: false });
            player.on('waiting', () => { document.getElementById('custom-loader').style.display = 'block'; });
            player.on('playing', () => { document.getElementById('custom-loader').style.display = 'none'; });
            player.on('error', () => { if (!isStopping) showError(); });
        });

        function pararReproducao() {
            isStopping = true;
            if (player) {
                player.pause(); player.src(""); if (hls) hls.destroy();
                document.getElementById('welcome-screen').style.display = 'flex';
                document.querySelectorAll('.btn-canal').forEach(b => b.classList.remove('playing'));
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function hideWelcome() { document.getElementById('welcome-screen').style.display = 'none'; }
        function showError() { if (!isStopping) { document.getElementById('error-overlay').style.display = 'flex'; document.getElementById('custom-loader').style.display = 'none'; } }
        function hideError() { document.getElementById('error-overlay').style.display = 'none'; }
    </script>
</body>
</html>
