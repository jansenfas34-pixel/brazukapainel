<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADMIN - BRAZUKA IPTV</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .admin-card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid #ffcc00; width: 100%; max-width: 500px; }
        h2 { color: #ffcc00; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ffcc00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .user-list { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .user-item { background: #2a2a2a; padding: 10px 15px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #ff4444; width: auto; padding: 5px 10px; margin: 0; }
        .info { font-size: 12px; color: #ffcc00; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2><i class="fas fa-user-shield"></i> PAINEL DO DONO</h2>
    <p class="info">Gerencie quem pode acessar o seu site</p>

    <div class="input-group">
        <label>Nome do Usuário (Sem espaços)</label>
        <input type="text" id="new-user" placeholder="ex: joao_silva">
    </div>
    <div class="input-group">
        <label>Senha</label>
        <input type="text" id="new-pass" placeholder="ex: 123456">
    </div>
    <button onclick="cadastrarUsuario()">CADASTRAR NOVO CLIENTE</button>

    <div class="user-list" id="userList">
        <h3>Usuários Ativos</h3>
        <div id="list-container">Carregando...</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://brazuka-monitor-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Carrega a lista automaticamente
    db.ref('usuarios').on('value', (snapshot) => {
        const users = snapshot.val();
        const container = document.getElementById('list-container');
        container.innerHTML = '';

        if (!users) {
            container.innerHTML = '<p style="color:#888">Nenhum usuário cadastrado.</p>';
            return;
        }

        for (let user in users) {
            const item = document.createElement('div');
            item.className = 'user-item';
            item.innerHTML = `
                <div>
                    <strong>${user}</strong><br>
                    <small style="color:#888">Senha: ${users[user].senha}</small>
                </div>
                <button class="btn-del" onclick="excluirUsuario('${user}')"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(item);
        }
    });

    function cadastrarUsuario() {
        const user = document.getElementById('new-user').value.trim().toLowerCase();
        const pass = document.getElementById('new-pass').value.trim();

        if (!user || !pass) {
            alert("Preencha o nome e a senha!");
            return;
        }

        // Limpa caracteres especiais que o Firebase não aceita
        const cleanUser = user.replace(/[.#$[\]]/g, "_");

        db.ref('usuarios/' + cleanUser).set({
            senha: pass
        }).then(() => {
            alert("Usuário " + cleanUser + " cadastrado com sucesso!");
            document.getElementById('new-user').value = '';
            document.getElementById('new-pass').value = '';
        }).catch(err => {
            alert("Erro ao cadastrar: " + err.message);
        });
    }

    function excluirUsuario(user) {
        if (confirm("Tem certeza que deseja remover o acesso de " + user + "?")) {
            db.ref('usuarios/' + user).remove().then(() => {
                alert("Usuário removido!");
            });
        }
    }
</script>

</body>
</html>
